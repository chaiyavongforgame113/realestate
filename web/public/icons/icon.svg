<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e11d48"/>
      <stop offset="0.55" stop-color="#b31e2a"/>
      <stop offset="1" stop-color="#7a0d16"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe6e9" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#g1)"/>
  <!-- House silhouette -->
  <g transform="translate(96,120)">
    <path d="M160 0 L316 120 V300 H4 V120 Z"
          fill="url(#g2)"
          stroke="#ffffff"
          stroke-width="6"
          stroke-linejoin="round"
          filter="url(#s)"/>
    <!-- Door -->
    <rect x="132" y="190" width="56" height="110" rx="8" fill="#b31e2a"/>
    <!-- Windows -->
    <rect x="52" y="170" width="56" height="50" rx="6" fill="#b31e2a" opacity="0.85"/>
    <rect x="212" y="170" width="56" height="50" rx="6" fill="#b31e2a" opacity="0.85"/>
    <!-- AI spark -->
    <g transform="translate(240,30)">
      <circle r="28" fill="#fde68a" opacity="0.9"/>
      <path d="M0,-16 L5,-5 L16,0 L5,5 L0,16 L-5,5 L-16,0 L-5,-5 Z"
            fill="#b31e2a"/>
    </g>
  </g>
</svg>
